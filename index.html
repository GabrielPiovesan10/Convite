<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET TOTAL - Zero margens e preenchimento */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fdfbf8; /* Cor de fundo do papel */
        }

        /* CONTAINER QUE COLA NAS BORDAS DO CELULAR */
        .invite-wrapper { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            perspective: 2000px; 
            overflow: hidden;
        }

        /* --- ENVELOPE (AS PORTAS) --- */
        .envelope-left, .envelope-right { 
            position: absolute; top: 0; width: 50.5vw; height: 100vh; 
            background: #f4f1ee; z-index: 10; 
            transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; border-right: 1px solid rgba(0,0,0,0.05); }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* BOTÃO DO SELO - CENTRALIZADO */
        .selo-container {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 70vw; max-width: 280px; z-index: 20; cursor: pointer;
        }
        .img-selo { width: 100%; height: auto; display: block; }

        /* --- INTERIOR (CONTEÚDO ROLÁVEL) --- */
        .card-scroll { 
            width: 100vw; height: 100vh; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        /* IMAGENS DO CONVITE - 100% DA LARGURA DA TELA */
        .img-full {
            width: 100%;
            height: auto;
            display: block;
        }

        .secao-botoes { position: relative; width: 100%; }

        /* GRID DE LINKS (ÁREAS DE CLIQUE) */
        .grid-links {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ANIMAÇÃO DE ABERTURA */
        .invite-wrapper.open .envelope-left { transform: rotateY(-140deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(140deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="lacre.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            
            <img src="nomes.jpg" class="img-full">

            <div class="secao-botoes">
                <img src="links.jpg" class="img-full">

                <div class="grid-links">
                    <a href="LINK_CONFIRMACAO" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
