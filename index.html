<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* O segredo para o Full Screen no celular */
        html, body { 
            width: 100%; 
            height: 100%; 
            height: -webkit-fill-available;
            overflow: hidden; 
            background-color: #f4f1ee; /* Cor das portas do envelope */
        }

        .invite-wrapper { 
            width: 100vw; 
            height: 100dvh; /* Altura dinâmica para mobile */
            position: fixed; /* Fixa na tela para não ter erro de scroll */
            top: 0;
            left: 0;
            perspective: 2000px; 
            overflow: hidden;
        }

        /* --- AS PORTAS DO ENVELOPE (TELA INICIAL) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 50.5%; /* Garante o encontro no meio */
            height: 100%; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; border-right: 1px solid rgba(0,0,0,0.05); }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* O BOTÃO (SELO) */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 300px;
            z-index: 20; 
            cursor: pointer;
            display: flex;
            justify-content: center;
        }
        .img-selo { width: 100%; height: auto; display: block; }

        /* --- INTERIOR --- */
        .card-scroll { 
            width: 100vw; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
            background-color: #fdfbf8;
        }

        .img-full {
            width: 100% !important;
            height: auto !important;
            display: block !important;
        }

        .secao-botoes { position: relative; width: 100%; }

        .grid-links {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ABERTURA */
        .invite-wrapper.open .envelope-left { transform: rotateY(-155deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(155deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="lacre.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            <img src="nomes.jpg" class="img-full">
            <div class="secao-botoes">
                <img src="links.jpg" class="img-full">
                <div class="grid-links">
                    <a href="LINK_WHATSAPP_CONFIRMAR" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
