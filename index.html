<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO - Zera tudo para não ter fresta nenhuma */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fdfbf8;
        }

        /* CONTAINER PRINCIPAL - AGORA OCUPANDO CADA PIXEL DA TELA */
        .invite-wrapper { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            perspective: 2000px; 
            overflow: hidden;
        }

        /* --- CAPA (O ENVELOPE QUE ABRE) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 51vw; /* Um pouquinho mais que 50 para garantir que se cruzem */
            height: 100vh; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; border-right: 1px solid rgba(0,0,0,0.03); }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* BOTÃO DO SELO (AUMENTADO) */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%);
            width: 300px; /* Aumentei aqui para ficar bem visível */
            height: 300px; 
            z-index: 20; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .img-selo { 
            width: 100%; /* Ele vai usar o tamanho total do container acima */
            height: auto; 
        }

        /* --- CONTEÚDO DE DENTRO (OCUPANDO TUDO) --- */
        .card-scroll { 
            width: 100vw; 
            height: 100vh; 
            overflow-y: auto; 
            background-color: #fdfbf8; 
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        /* IMAGEM DOS NOMES - LARGURA TOTAL */
        .img-parte-nomes { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* SEÇÃO DOS BOTÕES - LARGURA TOTAL */
        .secao-botoes { 
            position: relative; 
            width: 100%; 
        }
        
        .img-parte-botoes { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* ÁREAS DE CLIQUE (INVISÍVEIS) */
        .grid-links {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr 1fr;
        }

        .link-invisivel {
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-decoration: none; 
            color: transparent;
        }

        /* ANIMAÇÃO PARA ABRIR */
        .invite-wrapper.open .envelope-left { transform: rotateY(-160deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(160deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="https://i.postimg.cc/Qd3kmXzq/IMG-1267.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            
            <img src="https://i.postimg.cc/3RdgNWyM/IMG-1268.jpg" class="img-parte-nomes">

            <div class="secao-botoes">
                <img src="https://i.postimg.cc/4xPt1ptW/IMG-1269.jpg" class="img-parte-botoes">

                <div class="grid-links">
                    <a href="LINK_CONFIRMACAO" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
