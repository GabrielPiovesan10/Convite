<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta property="og:title" content="Convite de Casamento: Aliane & Luis Felipe">
    <meta property="og:description" content="Preparamos algo especial para você!">
    <meta property="og:image" content="https://gabrielpiovesan10.github.io/Convite/thumb.JPG">
    <meta property="og:url" content="https://gabrielpiovesan10.github.io/Convite/">
    <meta property="og:type" content="website">

    <title>Convite Aliane & Luis Felipe</title>
    <style>
    /* RESET TOTAL */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
        width: 100%; height: 100%; height: 100dvh; 
        overflow: hidden; background-color: #f4f1ee; 
    }

    .invite-wrapper { 
        width: 100vw; height: 100dvh; position: fixed; 
        top: 0; left: 0; perspective: 2000px; 
    }

    .envelope-left, .envelope-right { 
        position: absolute; top: 0; width: 50.5vw; height: 100%; 
        background: #f4f1ee; z-index: 10; 
        transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .envelope-left { left: 0; transform-origin: left; }
    .envelope-right { right: 0; transform-origin: right; }
    
    .selo-container {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 100vw; z-index: 20; cursor: pointer;
    }
    .img-selo { width: 100%; height: auto; display: block; }

    .card-scroll { 
        width: 100vw; height: 100%; overflow-y: auto; 
        display: flex; flex-direction: column; z-index: 5; 
        background-color: #fdfbf8; visibility: hidden;
    }

    .img-full { width: 100%; height: auto; display: block; }

    /* --- AQUI ESTÁ A SOLUÇÃO DEFINITIVA (CALIBRAGEM) --- */
    .secao-botoes { 
        position: relative; 
        width: 100%; 
        line-height: 0; /* Mata espaços fantasma */
    }

    .grid-links {
        position: absolute; 
        /* Com base na imagem 3, os botões começam mais ou menos a 35% do topo da imagem */
        top: 35%; 
        left: 0; 
        width: 100%; 
        /* O grid ocupa o resto da imagem (100% - 35% do topo - 10% de respiro no fundo) */
        height: 55%; 
        display: flex;
        flex-wrap: wrap;
        z-index: 30;
    }

    .grid-links a { 
        width: 50%; /* Esquerda e Direita */
        height: 33.33%; /* 3 linhas de botões */
        display: block;
        /*border: 1px solid red;  <-- Tire o comentário para testar se os quadrados vermelhos caíram no lugar certo */
    }

    /* ABERTURA */
    .invite-wrapper.open .envelope-left { transform: rotateY(-150deg); }
    .invite-wrapper.open .envelope-right { transform: rotateY(150deg); }
    .invite-wrapper.open .selo-container { display: none; }
    .invite-wrapper.open .card-scroll { visibility: visible; }
</style>

    
</head>
<body>

    <audio id="musicaConvite" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        <div class="selo-container" onclick="abrirConvite()"><img src="lacre.jpg" class="img-selo"></div>

        <div class="card-scroll" id="scroll-area">
            <img src="nomes.jpg" class="img-full">
            <div class="secao-botoes">
                <img src="links.jpg" class="img-full">
                <div class="grid-links">
                    <a href="https://api.whatsapp.com/send?phone=5519981470614&text=Confirmo minha presença no casamento de Aliane e Luis Felipe. Será uma alegria fazer parte desse momento tão especial." target="_blank"></a>
                    
                    <a href="https://maps.app.goo.gl/9y7zqaaaiWxsgUaj8?g_st=ic" target="_blank"></a>

                    <a href="https://sites.icasei.com.br/alianeefelipe/pages/37287638" target="_blank"></a>

                    <a href="https://sites.icasei.com.br/alianeefelipe/messages" target="_blank"></a>

                    <a href="https://wa.me/5519974176770" target="_blank"></a>

                    <a href="https://wa.me/5519971699536" target="_blank"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirConvite() {
            var audio = document.getElementById('musicaConvite');
            audio.play().catch(function(e) { console.log("Erro som:", e); });
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
