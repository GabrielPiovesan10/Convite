<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO - Mata qualquer respiro ou margem */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fdfbf8;
        }

        /* CONTAINER EM TELA CHEIA */
        .invite-wrapper { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            perspective: 2000px; 
            overflow: hidden;
        }

        /* --- CAPA (O ENVELOPE) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 51vw; 
            height: 100vh; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* BOTÃO DO SELO - GIGANTE NO CENTRO */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%);
            width: 350px; /* Aumentei para 350px para ocupar bem a tela */
            z-index: 20; 
            cursor: pointer;
            display: flex;
            justify-content: center;
        }
        .img-selo { 
            width: 120%; /* Super zoom no selo para matar bordas do arquivo */
            height: auto; 
            display: block; 
        }

        /* --- INTERIOR (PÁGINA DE ROLAGEM) --- */
        .card-scroll { 
            width: 100vw; 
            height: 100vh; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        /* CONTAINER DE ZOOM PARA AS IMAGENS INTERNAS */
        .zoom-box {
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .img-full-zoom {
            /* 115vw força a imagem a ser 15% maior que a tela, sumindo com as bordas */
            width: 115vw !important; 
            min-width: 115vw !important;
            height: auto;
            display: block;
            flex-shrink: 0;
        }

        .secao-botoes { 
            position: relative; 
            width: 100vw; 
            overflow: hidden;
        }

        /* GRID DE LINKS (ÁREAS DE CLIQUE SOBRE A IMAGEM 3) */
        .grid-links {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ABERTURA */
        .invite-wrapper.open .envelope-left { transform: rotateY(-160deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(160deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="https://i.postimg.cc/Qd3kmXzq/IMG-1267.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            
            <div class="zoom-box">
                <img src="https://i.postimg.cc/3RdgNWyM/IMG-1268.jpg" class="img-full-zoom">
            </div>

            <div class="secao-botoes">
                <div class="zoom-box">
                    <img src="https://i.postimg.cc/4xPt1ptW/IMG-1269.jpg" class="img-full-zoom">
                </div>

                <div class="grid-links">
                    <a href="LINK_CONFIRMACAO" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
