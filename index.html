    <style>
        :root {
            --gold: #c5a059;
            --navy: #0a192f;
            --white: #ffffff;
            --cream: #f9f7f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            color: var(--navy);
            overflow: hidden; 
        }

        body.unlocked { overflow: auto; }
        body.unlocked html { overflow: auto; }

        /* --- 🎁 EMBALAGEM DE LUXO --- */
        #presente-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: flex; flex-direction: column;
        }

        .box-part {
            flex: 1; background: var(--cream);
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
            width: 100%;
        }

        .box-top { border-bottom: 1px solid rgba(0,0,0,0.05); }
        .box-bottom { border-top: 1px solid rgba(0,0,0,0.05); }

        .seal-btn {
            position: absolute; 
            top: 47% !important; 
            left: 50% !important; 
            transform: translate3d(-50%, -50%, 0) !important;
            width: 48vw !important; 
            max-width: 380px !important; 
            z-index: 10000; 
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 3s infinite ease-in-out;
            background: none; border: none; outline: none;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .seal-btn img {
            width: 100%; height: auto; display: block;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.15));
            outline: 1px solid transparent;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }

        @keyframes pulse { 
            0%, 100% { transform: translate3d(-50%, -50%, 0) scale(1); }
            50% { transform: translate3d(-50%, -50%, 0) scale(1.03); }
        }

        .opened .box-top { transform: translateY(-100%); }
        .opened .box-bottom { transform: translateY(100%); }
        .opened .seal-btn { opacity: 0; pointer-events: none; transition: opacity 0.5s; }

        /* --- 📜 SITE COMPLETO --- */
        #site-content {
            min-height: 100vh; width: 100%; display: none;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hero {
            height: 100vh; width: 100%;
            background-color: var(--navy); 
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.ibb.co/g17P1tz/bfff2db2-0132-4f03-b906-b95ef0ec8fe5.jpg');
            background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center; text-align: center; color: white;
            position: relative;
        }
        
        .hero h1 { color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); font-size: 3.5rem; margin-bottom: 15px; font-family: 'Great Vibes', cursive; }
        .hero .welcome-text { text-transform: uppercase; letter-spacing: 4px; font-size: 0.65rem; margin-bottom: 25px; display: block; }
        .hero hr.decorative-line { width: 150px; border: 0.5px solid var(--gold); margin: 0 auto 20px auto; opacity: 0.6; }

        .section { padding: 90px 25px; text-align: center; background: white; }
        .section-cream { background: var(--cream); }

        .details-bg {
            position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: var(--navy);
            background-image: url('https://i.ibb.co/3964Df3W/d6dcbe13-d9ec-4349-acb6-942c0a96edb4.jpg');
            background-size: cover; background-position: center bottom;
            padding: 80px 20px 220px 20px; 
        }

        h2 { font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 3px; margin-bottom: 30px; color: var(--navy); }

        .content-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 25px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            color: var(--navy); max-width: 400px; width: 95%;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 40px auto 0 auto;
        }

        .btn-action {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 10px; background: white; border: 1px solid var(--gold);
            border-radius: 15px; text-decoration: none; color: var(--navy);
            font-size: 0.75rem; font-weight: 600; transition: 0.3s;
        }

        .btn { display: inline-block; padding: 18px 45px; border-radius: 45px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-top: 15px; cursor: pointer; border: none; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { border: 2px solid var(--gold); color: var(--gold); }
