<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO - Não deixa sobrar nenhum pixel */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #fdfbf8; /* Cor de fundo caso algo falhe */
        }

        /* CONTAINER PRINCIPAL - AGORA SEM LIMITES */
        .invite-wrapper { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            perspective: 2000px; 
            overflow: hidden;
            display: block; /* Removi o flex para ele não centralizar e "encolher" */
        }

        /* --- ENVELOPE (PORTAS) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 51vw; 
            height: 100vh; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* BOTÃO DO SELO - GIGANTE NO MEIO */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%);
            width: 320px; /* Aumentei bem o tamanho do botão */
            z-index: 20; 
            cursor: pointer;
        }
        .img-selo { width: 100%; height: auto; display: block; }

        /* --- INTERIOR (ROLAGEM TOTAL) --- */
        .card-scroll { 
            width: 100vw; 
            height: 100vh; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        /* AS IMAGENS DO CONVITE - FORÇANDO A TELA CHEIA */
        .img-convite {
            /* O PULO DO GATO: 102vw faz ela "vazar" um pouquinho para sumir bordas */
            width: 102vw !important; 
            margin-left: -1vw !important; /* Centraliza o vazamento */
            height: auto;
            display: block;
            min-width: 100vw;
        }

        .secao-botoes { 
            position: relative; 
            width: 100vw; 
        }

        /* ÁREAS DE CLIQUE INVISÍVEIS */
        .grid-links {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ANIMAÇÃO DE ABERTURA */
        .invite-wrapper.open .envelope-left { transform: rotateY(-160deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(160deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="https://i.postimg.cc/Qd3kmXzq/IMG-1267.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            
            <img src="https://i.postimg.cc/3RdgNWyM/IMG-1268.jpg" class="img-convite">

            <div class="secao-botoes">
                <img src="https://i.postimg.cc/4xPt1ptW/IMG-1269.jpg" class="img-convite">

                <div class="grid-links">
                    <a href="LINK_CONFIRMACAO" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
