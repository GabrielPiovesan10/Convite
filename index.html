<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO - Zera tudo para não ter fresta nenhuma */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; /* Trava a tela principal */
            background-color: #fdfbf8;
        }

        /* CONTAINER PRINCIPAL - AGORA 100% DA LARGURA E ALTURA */
        .invite-wrapper { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            perspective: 2000px; 
            overflow: hidden;
        }

        /* --- CAPA (O ENVELOPE QUE ABRE) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 51vw; /* Garante que as portas se cruzem no meio sem fresta */
            height: 100vh; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; border-right: 1px solid rgba(0,0,0,0.03); }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* BOTÃO DO SELO - Aumentei o tamanho base para ele preencher a tela */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%);
            width: 250px; /* Se achar pequeno, pode aumentar para 300px ou mais */
            height: 250px; 
            z-index: 20; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .img-selo { 
            width: 100%; 
            height: auto; 
            display: block;
        }

        /* --- INTERIOR (CONTEÚDO) --- */
        .card-scroll { 
            width: 100vw; 
            height: 100vh; 
            overflow-y: auto; 
            overflow-x: hidden;
            background-color: #fdfbf8; 
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
        }

        /* FORÇA AS IMAGENS A OCUPAREM 100% DA LARGURA DO CELULAR */
        .img-convite {
            width: 100vw; /* Ocupa a largura total da tela */
            height: auto;
            display: block;
        }

        .secao-botoes { 
            position: relative; 
            width: 100vw; 
        }

        /* GRID DE LINKS (ÁREAS DE CLIQUE) */
        .grid-links {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ANIMAÇÃO PARA ABRIR */
        .invite-wrapper.open .envelope-left { transform: rotateY(-155deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(155deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="https://i.postimg.cc/Qd3kmXzq/IMG-1267.jpg" class="img-selo">
        </div>

        <div class="card-scroll">
            
            <img src="https://i.postimg.cc/3RdgNWyM/IMG-1268.jpg" class="img-convite">

            <div class="secao-botoes">
                <img src="https://i.postimg.cc/4xPt1ptW/IMG-1269.jpg" class="img-convite">

                <div class="grid-links">
                    <a href="LINK_CONFIRMACAO" class="link-invisivel"></a>
                    <a href="LINK_MAPS" class="link-invisivel"></a>
                    <a href="LINK_PRESENTES" class="link-invisivel"></a>
                    <a href="LINK_RECADOS" class="link-invisivel"></a>
                    <a href="LINK_NOIVA" class="link-invisivel"></a>
                    <a href="LINK_NOIVO" class="link-invisivel"></a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
        }
    </script>
</body>
</html>
