<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Convite Aliane & Luis Felipe</title>
    <style>
        /* RESET ABSOLUTO - Não deixa sobrar nem um átomo de margem */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            background-color: #f4f1ee; /* Cor do envelope para não dar contraste */
        }

        /* CONTAINER PRINCIPAL - PREGADO NA TELA */
        .invite-wrapper { 
            width: 100vw; 
            height: 100dvh; 
            position: fixed; 
            top: 0;
            left: 0;
            perspective: 2000px; 
            overflow: hidden;
            touch-action: none;
        }

        /* --- ENVELOPE (PORTAS QUE COBREM TUDO) --- */
        .envelope-left, .envelope-right { 
            position: absolute; 
            top: 0; 
            width: 51vw; /* Força o encontro total no centro */
            height: 100%; 
            background: #f4f1ee; 
            z-index: 10; 
            transition: transform 2.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .envelope-left { left: 0; transform-origin: left; }
        .envelope-right { right: 0; transform-origin: right; }
        
        /* CONTAINER DO SELO - AGORA SEM LIMITES */
        .selo-container {
            position: absolute; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%) scale(1.1); /* ZOOM PARA FICAR PERTO */
            width: 100vw; /* OCUPA A LARGURA TODA DA TELA */
            z-index: 20; 
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-selo { 
            width: 100%; /* A imagem vai esticar até o talo */
            height: auto; 
            display: block;
        }

        /* --- INTERIOR --- */
        .card-scroll { 
            width: 100vw; 
            height: 100%; 
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex; 
            flex-direction: column; 
            z-index: 5;
            -webkit-overflow-scrolling: touch;
            background-color: #fdfbf8;
            visibility: hidden;
        }

        .img-full {
            width: 100% !important;
            height: auto !important;
            display: block !important;
        }

        .secao-botoes { position: relative; width: 100%; }

        .grid-links {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr 1fr;
            z-index: 30;
        }
        .link-invisivel { text-decoration: none; color: transparent; }

        /* ABERTURA */
        .invite-wrapper.open { touch-action: auto; }
        .invite-wrapper.open .card-scroll { visibility: visible; }
        .invite-wrapper.open .envelope-left { transform: rotateY(-155deg); }
        .invite-wrapper.open .envelope-right { transform: rotateY(155deg); }
        .invite-wrapper.open .selo-container { opacity: 0; visibility: hidden; pointer-events: none; }

    </style>
</head>
<body>

    <div class="invite-wrapper" id="convite">
        <div class="envelope-left"></div>
        <div class="envelope-right"></div>
        
        <div class="selo-container" onclick="abrirConvite()">
            <img src="lacre.jpg" class="img-selo">
        </div>

        <div class="card-scroll" id="scroll-area">
            <img src="nomes.jpg" class="img-full">
            <div class="secao-botoes">
                <img src="links.jpg" class="img-full">
                <div class="grid-links">
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                    <a href="SUA_URL_AQUI" class="link-invisivel"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirConvite() {
            document.getElementById('convite').classList.add('open');
            setTimeout(() => {
                document.getElementById('scroll-area').style.overflowY = 'auto';
            }, 500);
        }
    </script>
</body>
</html>
